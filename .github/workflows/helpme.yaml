name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write   # upload SARIF to GitHub Security tab
  pull-requests: write     # comment on PRs
  issues: write            # comment on issues
  id-token: write          # OIDC token
  actions: read

jobs:
    # GATE#0: Secret scanning (TruffleHog + Gitleaks)
    secret-scanning:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0   # full history so scanners can diff all commits

            - name: Run TruffleHog
              uses: trufflesecurity/trufflehog@main
              continue-on-error: true
              with:
                path: ./
                base: ${{ github.event.repository.default_branch }}
                head: HEAD
                extra_args: --only-verified

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              continue-on-error: true
              env:
                TOKEN: ${{ secrets.TOKEN }}
                GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
                GITLEAKS_ENABLE_SUMMARY: true

    # GATE#1a: SAST via SonarQube
    sast-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0   # full history for blame / new-code detection

            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v7.1.0
              continue-on-error: true
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # GATE#1b: SAST via CodeQL (results in GitHub Security tab)
    codeql-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }}
        strategy:
            matrix:
                language: [ 'javascript' ]   # covers Next.js / React / TypeScript
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                languages: ${{ matrix.language }}
                queries: security-extended,security-and-quality

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3
              with:
                category: "/language:${{ matrix.language }}"

    # GATE#2: Dependency scanning via OWASP Dependency-Check (SARIF + HTML)
    dependency-scanning:
        runs-on: ubuntu-latest
        needs: [sast-scan, secret-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node 20
              uses: actions/setup-node@v4
              with:
                node-version: '20'

            - name: Install npm dependencies
              run: npm ci

            - name: Depcheck
              uses: dependency-check/Dependency-Check_Action@main
              continue-on-error: true
              id: Depcheck
              with:
                project: 'DontEverPushThisCodeV2'
                path: '.'
                format: 'SARIF'
                out: 'reports'
                args: >
                    --failOnCVSS 7
                    --enableRetired

            - name: Upload Depcheck SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                sarif_file: reports/dependency-check-report.sarif
                category: dependency-check

            - name: Upload Depcheck HTML report as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: depcheck-report
                path: reports/

    # GATE#3: Container/Image scanning via Trivy (SARIF + artifact)
    image-scanning:
        runs-on: ubuntu-latest
        needs: [dependency-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t my-app:latest .

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              continue-on-error: true
              with:
                image-ref: 'my-app:latest'
                format: 'sarif'
                output: 'trivy-results.sarif'
                severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
                ignore-unfixed: false

            - name: Upload Trivy SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                sarif_file: trivy-results.sarif
                category: trivy

            - name: Upload Trivy SARIF as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: trivy-results
                path: trivy-results.sarif

    # GATE#2b: Dependency + Code + Container scanning via Snyk
    snyk-scan:
        runs-on: ubuntu-latest
        needs: [sast-scan, secret-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node 20
              uses: actions/setup-node@v4
              with:
                node-version: '20'

            - name: Install npm dependencies
              run: npm ci

            - name: Install Snyk CLI
              uses: snyk/actions/setup@master

            # snyk test — open-source dependency vulnerabilities
            - name: Snyk test (dependency vulnerabilities)
              continue-on-error: true
              env:
                SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              run: snyk test --all-projects --sarif-file-output=snyk-deps.sarif

            # snyk code test — SAST: code-level vulnerabilities (injection, XSS, etc.)
            - name: Snyk code test (SAST)
              continue-on-error: true
              env:
                SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              run: snyk code test --sarif-file-output=snyk-code.sarif

            # snyk container test — image/OS layer vulnerabilities
            - name: Build Docker image for Snyk container scan
              run: docker build -t my-app:latest .

            - name: Snyk container test
              continue-on-error: true
              env:
                SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              run: snyk container test my-app:latest --file=Dockerfile --sarif-file-output=snyk-container.sarif

            # snyk monitor — upload live snapshot to Snyk.io dashboard
            - name: Snyk monitor (upload snapshot)
              continue-on-error: true
              env:
                SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              run: snyk monitor --all-projects

            - name: Upload Snyk dependency SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                sarif_file: snyk-deps.sarif
                category: snyk-deps

            - name: Upload Snyk code SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                sarif_file: snyk-code.sarif
                category: snyk-code

            - name: Upload Snyk container SARIF to Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              continue-on-error: true
              with:
                sarif_file: snyk-container.sarif
                category: snyk-container

            - name: Upload Snyk SARIF reports as artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: snyk-results
                path: |
                    snyk-deps.sarif
                    snyk-code.sarif
                    snyk-container.sarif
    # GATE#4: IaC scanning (Since there is no infrastructure code here and it is out of scope for this class so we could skip it HELL YEAH!)
    # GATE#5: DAST (We have OWASP ZAP workshop here so we can skip this one too! YOHOOO!)

